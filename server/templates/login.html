<!DOCTYPE html>
<html>
<head>
    <title>SCCSIMS — Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <style>
        :root {
            --bg-base:     #050c17;
            --bg-panel:    #0a1628;
            --bg-card:     #0d1e35;
            --bg-surface:  #111f38;

            --border:      rgba(0,200,255,0.12);
            --border-glow: rgba(0,200,255,0.35);

            --cyan:        #00c8ff;
            --cyan-dim:    rgba(0,200,255,0.10);
            --green:       #00e676;
            --red:         #ff3d5a;
            --red-dim:     rgba(255,61,90,0.12);

            --text-primary:   #e8f4fd;
            --text-secondary: #7a9bb5;
            --text-muted:     #3d5a78;

            --font-display: 'Oxanium', sans-serif;
            --font-mono:    'JetBrains Mono', monospace;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0; padding: 0;
        }

        body {
            font-family: var(--font-display);
            min-height: 100vh;
            background: var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── GRID BACKGROUND ── */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,200,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,200,255,0.04) 1px, transparent 1px);
            background-size: 44px 44px;
            pointer-events: none;
        }

        /* ── SCAN LINES ── */
        .bg-scan {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,200,255,0.013) 2px,
                rgba(0,200,255,0.013) 4px
            );
            pointer-events: none;
        }

        /* ── RADIAL GLOW ── */
        .bg-glow {
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(0,200,255,0.07) 0%, transparent 65%);
            pointer-events: none;
        }

        /* ── CORNER ACCENTS ── */
        .corner {
            position: fixed;
            width: 120px;
            height: 120px;
            pointer-events: none;
        }
        .corner-tl { top: 24px; left: 24px; border-top: 1px solid var(--border-glow); border-left: 1px solid var(--border-glow); }
        .corner-tr { top: 24px; right: 24px; border-top: 1px solid var(--border-glow); border-right: 1px solid var(--border-glow); }
        .corner-bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--border-glow); border-left: 1px solid var(--border-glow); }
        .corner-br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--border-glow); border-right: 1px solid var(--border-glow); }

        /* ── SYSTEM INFO BAR ── */
        .sys-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 28px;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            pointer-events: none;
        }

        .sys-bar span { display: flex; align-items: center; gap: 6px; }
        .sys-bar .dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
            animation: blink 2.2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        /* ── LOGIN CARD ── */
        .card {
            position: relative;
            z-index: 10;
            width: min(420px, calc(100vw - 40px));
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 38px 38px;
            box-shadow:
                0 0 0 1px rgba(0,200,255,0.05),
                0 20px 60px rgba(0,0,0,0.5),
                0 0 80px rgba(0,200,255,0.05);
            animation: cardIn 0.55s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)   scale(1); }
        }

        /* top edge glow line */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--cyan), transparent);
            border-radius: 1px;
        }

        /* ── BRAND BLOCK ── */
        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 36px;
        }

        .shield-wrap {
            width: 64px;
            height: 64px;
            background: var(--cyan-dim);
            border: 1px solid var(--border-glow);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 16px;
            box-shadow: 0 0 24px rgba(0,200,255,0.15);
            animation: shieldPulse 3s ease-in-out infinite;
        }

        @keyframes shieldPulse {
            0%, 100% { box-shadow: 0 0 24px rgba(0,200,255,0.15); }
            50%       { box-shadow: 0 0 40px rgba(0,200,255,0.30); }
        }

        .brand-name {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--cyan);
            text-shadow: 0 0 22px rgba(0,200,255,0.4);
        }

        .brand-sub {
            font-size: 10px;
            letter-spacing: 2.5px;
            color: var(--text-muted);
            margin-top: 5px;
            font-weight: 300;
        }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider-text {
            font-size: 9px;
            letter-spacing: 2.5px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* ── ERROR BOX ── */
        .error-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--red-dim);
            border: 1px solid rgba(255,61,90,0.3);
            border-radius: 8px;
            padding: 11px 14px;
            margin-bottom: 22px;
            font-size: 13px;
            color: var(--red);
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-6px); }
            40%       { transform: translateX(6px); }
            60%       { transform: translateX(-4px); }
            80%       { transform: translateX(4px); }
        }

        /* ── FORM FIELDS ── */
        .field {
            margin-bottom: 16px;
        }

        .field-label {
            display: block;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 7px;
            font-weight: 400;
        }

        .field-wrap {
            position: relative;
        }

        .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            opacity: 0.45;
            pointer-events: none;
        }

        .field-input {
            width: 100%;
            padding: 12px 42px 12px 42px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 14px;
            caret-color: var(--cyan);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .field-input::placeholder {
            color: var(--text-muted);
            font-size: 13px;
        }

        .field-input:focus {
            border-color: var(--border-glow);
            background: var(--bg-surface);
            box-shadow: 0 0 0 3px rgba(0,200,255,0.08), 0 0 14px rgba(0,200,255,0.1);
        }

        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 15px;
            opacity: 0.45;
            padding: 4px;
            transition: opacity 0.2s;
            width: auto;
            margin: 0;
            color: var(--text-secondary);
        }

        .toggle-btn:hover { opacity: 0.9; }

        /* ── SUBMIT BUTTON ── */
        .submit-btn {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: transparent;
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            color: var(--cyan);
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.25s ease;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,200,255,0.12), rgba(0,200,255,0.04));
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .submit-btn:hover {
            box-shadow: 0 0 24px rgba(0,200,255,0.2), inset 0 0 20px rgba(0,200,255,0.05);
            border-color: var(--cyan);
            color: #fff;
        }

        .submit-btn:hover::before { opacity: 1; }

        .submit-btn:active { transform: scale(0.98); }

        .submit-btn.loading {
            opacity: 0.55;
            pointer-events: none;
            letter-spacing: 2px;
        }

        .btn-inner {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* spinner */
        .spinner {
            display: none;
            width: 14px; height: 14px;
            border: 2px solid rgba(0,200,255,0.3);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .submit-btn.loading .spinner { display: block; }
        .submit-btn.loading .btn-label { opacity: 0.7; }

        /* ── FOOTER ── */
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 28px;
            font-size: 10px;
            letter-spacing: 1.5px;
            color: var(--text-muted);
        }

        .enc-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 5px var(--green);
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border-glow); border-radius: 2px; }
    </style>
</head>

<body>

    <!-- backgrounds -->
    <div class="bg-grid"></div>
    <div class="bg-scan"></div>
    <div class="bg-glow"></div>

    <!-- corner frame decorations -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- system status bar -->
    <div class="sys-bar">
        <span><div class="dot"></div>ENCRYPTED CHANNEL</span>
        <span id="sysClock">--:--:--</span>
        <span>AES-256 · TLS 1.3</span>
    </div>

    <!-- ── LOGIN CARD ── -->
    <div class="card">

        <!-- brand -->
        <div class="brand">
            <div class="shield-wrap">🛡️</div>
            <div class="brand-name">SCCSIMS</div>
            <div class="brand-sub">Smart College Cyber Security & Infrastructure Management System</div>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">Admin Access</div>
            <div class="divider-line"></div>
        </div>

        <!-- error -->
        {% if error %}
        <div class="error-box">
            ⚠ &nbsp;{{ error }}
        </div>
        {% endif %}

        <!-- form -->
        <form method="POST" onsubmit="handleLogin(event)">

            <div class="field">
                <label class="field-label">Username</label>
                <div class="field-wrap">
                    <span class="field-icon">👤</span>
                    <input
                        class="field-input"
                        type="text"
                        name="username"
                        placeholder="Enter username"
                        autocomplete="username"
                        required
                    >
                </div>
            </div>

            <div class="field">
                <label class="field-label">Password</label>
                <div class="field-wrap">
                    <span class="field-icon">🔑</span>
                    <input
                        class="field-input"
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter password"
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" class="toggle-btn" onclick="togglePassword()" title="Toggle visibility">
                        <span id="eyeIcon">👁</span>
                    </button>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="loginBtn">
                <div class="btn-inner">
                    <div class="spinner"></div>
                    <span class="btn-label" id="btnLabel">Authenticate</span>
                </div>
            </button>

        </form>

        <!-- footer -->
        <div class="card-footer">
            <div class="enc-dot"></div>
            <span>Secured Connection · SCCSIMS v2.0</span>
        </div>

    </div>

    <script>
        /* ── Clock ── */
        function updateClock(){
            document.getElementById("sysClock").innerText =
                new Date().toLocaleTimeString([], { hour12: false });
        }
        updateClock();
        setInterval(updateClock, 1000);

        /* ── Toggle Password ── */
        function togglePassword(){
            let input = document.getElementById("password");
            let icon  = document.getElementById("eyeIcon");
            if(input.type === "password"){
                input.type = "text";
                icon.innerText = "🙈";
            } else {
                input.type = "password";
                icon.innerText = "👁";
            }
        }

        /* ── Login Handler ── */
        function handleLogin(e){
            let btn   = document.getElementById("loginBtn");
            let label = document.getElementById("btnLabel");
            btn.classList.add("loading");
            label.innerText = "Authenticating...";
        }
    </script>

</body>
</html>
